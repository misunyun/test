<script type="text/javascript">
var ua = window.navigator.userAgent;

var ieCircleAuto = false; 	
function giftEnd(n){ $(".hiEvent-M-1257 .giftPop"+n).show(); }    
function rouletteEnd(n){ 
	if(ua.indexOf("MSIE 8.0") != -1){ 
		$(".hiEvent-M-1257 #circleIE20151026").show(); 
		ieCircleAuto = true; 
		ieCircle(); 
		setTimeout(function(){ieCircleEnd(n)},2000); 
	}else if(ua.indexOf("MSIE 9.0") != -1){ 
		$(".hiEvent-M-1257 #circleIE20151026").show(); 
		ieCircleAuto = true; 
		ieCircle(); 
		setTimeout(function(){ieCircleEnd(n)},2000); 
	}else{ 
		$(".hiEvent-M-1257 #circle").removeClass("spin1").removeClass("spin2").removeClass("spin3").removeClass("spin4").removeClass("spin5"); 
		$(".hiEvent-M-1257 #circle").addClass("spin"+n); setTimeout(function(){giftEnd(n)},3500); 
	} 
}    
function circleLayerPopClose(){

$(function(){
	$(".hiEvent-M-1257 .btn_view").click(function(){
		$(".hiEvent-M-1257 .evt_pop").show();
		$('body').addClass('pop_active');
		var total = $('.hiEvent-M-1257 .pop_head').outerHeight() + $('.hiEvent-M-1257 .cont_area').outerHeight();
		pop_sizing(total, $('.hiEvent-M-1257 .layer_inner'), $('.hiEvent-M-1257 .pop_head'), $('.hiEvent-M-1257 .pop_cont'));		
	});

	$(window).on('resize', function(){
		var total = $('.hiEvent-M-1257 .pop_head').outerHeight() + $('.hiEvent-M-1257 .cont_area').outerHeight();
		pop_sizing(total, $('.hiEvent-M-1257 .layer_inner'), $('.hiEvent-M-1257 .pop_head'), $('.hiEvent-M-1257 .pop_cont'));
	});

	$(".hiEvent-M-1257 .btn_close").click(function(){
		$(".hiEvent-M-1257 .evt_pop").hide();
		$('body').removeClass('pop_active');
	});
	$(".hiEvent-M-1257 .pop_confirm").click(function(){
		$(".hiEvent-M-1257 .evt_pop").hide();
		$('body').removeClass('pop_active');
	});
});
function pop_sizing(total, Wrap, Except, scrollTarget){
	if (total >= $(window).height())
	{
		Wrap.addClass('over_size');
		Wrap.css({
			marginTop:0
		});
		scrollTarget.height(Wrap.height() - Except.outerHeight());
	} else {
		Wrap.removeClass('over_size');
		scrollTarget.css({
			height:'auto'
		});
		Wrap.css({
			marginTop:-(Wrap.height() / 2)
		});
	}
}
</script>
