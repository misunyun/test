<!-- script_20170928수정 -->
<script type="text/javascript">
$(function(){	
	var urlHash = window.location.hash;
	var flag;
	var timer;
	if ( urlHash ){
		timer = setTimeout(function(){
			console.log(  '---------------'  );
			flag = setInterval(function(){
				console.log(  $('.hiEvent-M-1600 .sec_quiz').offset().top  );
				console.log( (screen.width*4.45)+50 );
				if ( $('.hiEvent-M-1600 .sec_quiz').offset().top > (screen.width*4.45)+50 ) {
					$("html, body").animate({scrollTop: $(urlHash).offset().top-50}, 500);
					clearInterval(flag);
				}
			}, 100);
		}, 1200);
	}
	$(".hiEvent-M-1600 a[href*='#']:not([href='#'])").click(function() {
		if (location.pathname.replace(/^\//,"") == this.pathname.replace(/^\//,"") && location.hostname == this.hostname) {
			var target = $(this.hash);
			target = target.length ? target : $("[name=' + this.hash.slice(1) +']");
			if (target.length) {
				$("html, body").animate({
					scrollTop: target.offset().top-50
				}, 500);
				return false;
			}
		}
	});	
	/* D:카드가 하나일때 */
	$(".hiEvent-M-1600 .a1").on("click",function(){
		if($(this).hasClass("on")){
			$(this).removeClass("on");
			$(this).find("img").attr("src",$(this).find("img").attr("src").replace("on.jpg", ".jpg"));
			$(this).next("div").hide();
		}else{
			$(this).addClass("on");
			$(this).find("img").attr("src",$(this).find("img").attr("src").replace(".jpg", "on.jpg"));
			$(this).next("div").show();
		}
	});
	/* //D:카드가 하나일때 */
	/* 자동차애니메이션 수정 */
	$(".hiEvent-M-1600 .car").css({
		opacity:"1",
		left:"2%"
	});
	$(window).load(function(){
		setTimeout(function(){
			carMove();
		}, 1000);
	});
	/* //자동차애니메이션 수정 */
});
/* 자동차애니메이션 추가 */
function carMove(){
	$(".hiEvent-M-1600 .car").animate({
		opacity:"1",
		left:"10%"
		}, {
			easing:"linear",
			duration:900,
			complete:function(){
				$(this).animate({
					left:"90%"
				}, {
					easing:"linear",
					duration:3000,
					complete:function(){
						$(this).animate({
							opacity:"0",
							left:"100%",
							right:-($(this).width() + 10)
						}, {
							easing:"linear",
							duration:450,
							complete:function(){
								$(this).removeAttr('style');
								$(this).delay(1500).css({
									opacity:"0",
									left:-($(".hiEvent-M-1600 .car").width() - 10)
								});
							carMove();
						}
					});
				}
			});
		}
	});
}
/* //자동차애니메이션 추가 */
</script>
